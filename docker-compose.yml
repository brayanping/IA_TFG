version: '3.8'

services:
  # ============================
  # BASE DE DATOS - PostgreSQL
  # ============================
  database:
    image: postgres:15-alpine
    container_name: edu-ia-db
    environment:
      POSTGRES_DB: eduia_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================
  # BACKEND - Java Spring Boot
  # ============================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edu-ia-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://database:5432/eduia_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SERVER_PORT: 8080
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    command: mvn spring-boot:run

  # ============================
  # FRONTEND - React
  # ============================
  frontend:
    build:
      context: ./edu-ia-frontend
      dockerfile: Dockerfile
    container_name: edu-ia-frontend
    environment:
      REACT_APP_API_URL: http://localhost:8080/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./edu-ia-frontend/src:/app/src

  # ============================
  # SERVICIO IA - Python
  # ============================
  ia-service:
    build:
      context: ./edu-ia-service
      dockerfile: Dockerfile
    container_name: edu-ia-service
    ports:
      - "8000:8000"
    volumes:
      - ./edu-ia-service:/app
    environment:
      PYTHONUNBUFFERED: 1

# ============================
# VOLÚMENES
# ============================
volumes:
  postgres_data:

# ============================
# NOTAS DE USO
# ============================
# Para usar Docker Compose:
#
# 1. Instalar Docker Desktop desde https://www.docker.com/products/docker-desktop
#
# 2. Ejecutar:
#    docker-compose up --build
#
# 3. Acceder a:
#    - Frontend: http://localhost:3000
#    - Backend: http://localhost:8080/api
#    - Base de datos: postgresql://postgres:postgres@localhost:5432/eduia_db
#
# 4. Para detener:
#    docker-compose down
#
# 5. Para ver logs:
#    docker-compose logs -f [servicio]
#
# ============================

